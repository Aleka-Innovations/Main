<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="icon" type="image/x-icon" href="Images/Logo.png">
    <link rel="stylesheet 1" href="CSS/Main.css">
    <link rel="stylesheet 2" href="CSS/Contact.css">
    <link rel="stylesheet 3" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <script src="JavaScript/Main.js"></script>

    <title>Contact</title>
</head>
<body>
    <header class="background-header"></header>
    
    <div class="navbar">
        <div class="logo">
            <a href="Home.html"><img src="Images/Logo.png"></a>
        </div>
        
        <div class="logotext">
            <a href="Home.html"><p>Aleka</p></a>
        </div>

        <div class="maintext">
            <ul class="links">
                <li><a href="Home.html" class="underline">Home</a></li>
                <li><a href="About.html" class="underline">About</a></li>
                <li><a href="Tools.html" class="underline">Tools</a></li>
                <li><a href="Rules.html" class="underline">Rules</a></li>
                <li><a href="Contact.html" class="disabled">Contact</a></li>
                <li><a href="News.html" class="underline" id="news">News</a></li>
            </ul>
        </div>
       <div class="button">
        <a href="Signin.html" class="action_btn">Sign In</a>
        <a href="JoinUs.html" class="action_btn2">Join Us</a>
       </div>
        <button class="toggle_btn">☰</button>
    </div>

    <div class="dropdown_menu">
        <li><a href="Home.html" class="underline">Home</a></li>
        <li><a href="About.html" class="underline">About</a></li>
        <li><a href="Tools.html" class="underline">Tools</a></li>
        <li><a href="Rules.html" class="underline">Rules</a></li>
        <li><a href="Contact.html" class="disabled">Contact</a></li>
        <li><a href="News.html" class="underline" id="news">News</a></li>
        <li><a href="Signin.html" class="action_btn">Sign In</a></li>
        <li><a href="JoinUs.html" class="action_btn2">Join Us</a></li>
    </div>

    <main>
        <section id="main">
            <h1>Contact</h1>

            <div class="contact container">
                <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
                    <div class="contact-left-title">
                        <h2>Get in touch.</h2>
                        <hr>
                    </div>
                    <input type="hidden" name="access_key" value="0704f714-db70-4f89-8fe0-7b9d2250e9fa">
                    <div class="email-container">
                        <i class="fas fa-envelope"></i> <label for="email">E-Mail</label>
                    </div>
                    <input type="email" name="email" placeholder="E-Mail" class="contact-inputs" kreves>
                    <div class="subject-container">
                        <i class="fas fa-tag"></i> <label for="subject">Subject</label>
                    </div>
                    <input type="text" name="name" placeholder="Subject" class="contact-inputs" kreves>
                    <div class="message-container">
                        <i class="fas fa-comment"></i>  <label for="message">Message</label>
                    </div>
                    <textarea name="message" placeholder="Message" class="contact-inputs" kreves></textarea>
                    <button type="submit">Send ➤</button>
                </form>
            </div>
        </section>
    </main>
    
<br><br><br>

    <div class="social-container">
        <img src="Images/Twitter.png" alt="" onclick="Twitter()" class="social">
        <img src="Images/Discord.png" alt="" onclick="Discord()" class="social">
    </div>
    <p class="copyright">© Copyright 2024 Aleka. All rights reserved.</p>

    <script>
        const toggleBtn = document.querySelector(".toggle_btn")
        const dropDownMenu = document.querySelector(".dropdown_menu")
        
        toggleBtn.onclick = function () {

            dropDownMenu.classList.toggle("open")
            const isOpen = dropDownMenu.classList.contains("open")

            if (isOpen)
            {
                toggleBtn.innerHTML = "➤"
            } else
            {
                toggleBtn.innerHTML = "☰"
            }
        }
    </script>
</body>
</html>
