<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="icon" type="image/x-icon" href="Images/Logo.png">
    <link rel="stylesheet 1" href="CSS/Main.css">
    <link rel="stylesheet 2" href="CSS/Reset.css">

    <script src="JavaScript/Main.js"></script>

    <link rel="stylesheet 3" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script type="module" src="JavaScript/Firebaseauth.js"></script>

    <title>Contact</title>
</head>
<body>
    <header class="background-header"></header>
    
    <div class="navbar">
        <div class="logo">
            <a href="Home.html"><img src="Images/Logo.png"></a>
        </div>
        
        <div class="logotext">
            <a href="Home.html"><p>Aleka</p></a>
        </div>

        <div class="maintext">
            <ul class="links">
                <li><a href="Home.html" class="underline">Home</a></li>
                <li><a href="About.html" class="underline">About</a></li>
                <li><a href="Tools.html" class="underline">Tools</a></li>
                <li><a href="Rules.html" class="underline">Rules</a></li>
                <li><a href="Contact.html" class="underline">Contact</a></li>
                <li><a href="News.html" class="underline" id="news">News</a></li>
            </ul>
        </div>
       <div class="button">
        <a href="Signin.html" class="BTNdisabled">Sign In</a>
        <a href="JoinUs.html" class="action_btn2">Join Us</a>
       </div>
        <button class="toggle_btn">☰</button>
    </div>

    <div class="dropdown_menu">
        <li><a href="Home.html" class="underline">Home</a></li>
        <li><a href="About.html" class="underline">About</a></li>
        <li><a href="Tools.html" class="underline">Tools</a></li>
        <li><a href="Rules.html" class="underline">Rules</a></li>
        <li><a href="Contact.html" class="underline">Contact</a></li>
        <li><a href="News.html" class="underline" id="news">News</a></li>
        <li><a href="Signin.html" class="BTNdisabled">Sign In</a></li>
        <li><a href="JoinUs.html" class="action_btn2">Join Us</a></li>
    </div>

    <main>
        <section id="main">
            <div class="container" id="signIn">
                <h1 class="form-title">Reset password</h1>
                <form method="post" action="">
                    <div id="signInMessage" class="messageDiv"></div>
                    <div class="label-container">
                        <i class="fas fa-envelope"></i> <label for="password">E-Mail</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="resetEmail" placeholder="E-Mail" required>
                    </div>
                    <br>
                    <button class="upBTN" id="forgotPassword">Reset</button>
                </form>
                <br>
                <div class="links">
                    <p>Know the password?</p>
                    <a href="Signin.html" class="upBTN">Sign In</a>
                </div>
            </div>
        </section>
    </main>

    <script src="JavaScript/Signin.js"></script>
    
<br><br><br>

    <div class="social-container">
        <img src="Images/Twitter.png" alt="" onclick="Twitter()" class="social">
        <img src="Images/Discord.png" alt="" onclick="Discord()" class="social">
    </div>
    <p class="copyright">© Copyright 2024 Aleka. All rights reserved.</p>

    <script>
        const toggleBtn = document.querySelector(".toggle_btn")
        const dropDownMenu = document.querySelector(".dropdown_menu")
        
        toggleBtn.onclick = function () {

            dropDownMenu.classList.toggle("open")
            const isOpen = dropDownMenu.classList.contains("open")

            if (isOpen)
            {
                toggleBtn.innerHTML = "➤"
            } else
            {
                toggleBtn.innerHTML = "☰"
            }
        }
    </script>
</body>
</html>
